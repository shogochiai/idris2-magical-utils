# WasmBuilder Specification
# Idris2 → IC WASM build pipeline

[definitions]
prefix = "REQ_WASM"

[[spec_area]]
name = "RefC Compilation"

[[spec]]
id = "${prefix}_REFC_001"
title = "Compile Idris2 to C via RefC backend"
invariant = "idris2 --codegen refc produces valid C file"

[[spec]]
id = "${prefix}_REFC_002"
title = "Handle package dependencies"
invariant = "-p flags passed correctly to idris2"

[[spec_area]]
name = "Runtime Preparation"

[[spec]]
id = "${prefix}_RT_001"
title = "Download RefC runtime sources"
invariant = "Runtime files fetched from Idris2 repo when not cached"

[[spec]]
id = "${prefix}_RT_002"
title = "Download mini-gmp"
invariant = "mini-gmp.c/h fetched from gmplib when not cached"

[[spec]]
id = "${prefix}_RT_003"
title = "Create gmp.h wrapper"
invariant = "gmp.h provides mpz_inits/mpz_clears wrappers"

[[spec_area]]
name = "Emscripten Compilation"

[[spec]]
id = "${prefix}_EMCC_001"
title = "Compile C to WASM"
invariant = "emcc produces standalone WASM with STANDALONE_WASM=1"

[[spec]]
id = "${prefix}_EMCC_002"
title = "Include IC0 support"
invariant = "canister_entry.c and ic0_stubs.c linked"

[[spec]]
id = "${prefix}_EMCC_003"
title = "Disable filesystem"
invariant = "FILESYSTEM=0 to avoid WASI imports"

[[spec_area]]
name = "WASI Stubbing"

[[spec]]
id = "${prefix}_WASI_001"
title = "Stub fd_close import"
invariant = "wasi_snapshot_preview1.fd_close replaced with stub returning 0"

[[spec]]
id = "${prefix}_WASI_002"
title = "Stub fd_write import"
invariant = "wasi_snapshot_preview1.fd_write replaced with stub returning 0"

[[spec]]
id = "${prefix}_WASI_003"
title = "Stub fd_seek import"
invariant = "wasi_snapshot_preview1.fd_seek replaced with stub returning 0"

[[spec]]
id = "${prefix}_WASI_004"
title = "Handle missing wabt gracefully"
invariant = "If wasm2wat/wat2wasm unavailable, copy original WASM"

[[spec_area]]
name = "Build Pipeline"

[[spec]]
id = "${prefix}_BUILD_001"
title = "buildCanister executes all steps"
invariant = "RefC → Runtime → Emcc → WASI stub in sequence"

[[spec]]
id = "${prefix}_BUILD_002"
title = "Return stubbed WASM path on success"
invariant = "BuildSuccess contains path to *_stubbed.wasm"

[[spec]]
id = "${prefix}_BUILD_003"
title = "Return error message on failure"
invariant = "BuildError contains descriptive error from failed step"

[[spec]]
id = "${prefix}_BUILD_004"
title = "Auto-detect IC0 support location"
invariant = "buildCanisterAuto finds lib/ic0 or ../idris2-icwasm/support/ic0"

# =============================================================================
# Test Build Contract (lazy dfx coverage)
# =============================================================================

[[spec_area]]
name = "Test Build Contract"

[[spec]]
id = "REQ_ICWASM_TESTBUILD_001"
title = "setupTestBuild generates valid test harness for src/Tests/AllTests.idr"
invariant = "Generated temp test build compiles when Tests.AllTests exposes runTests/runMinimalTests/runTrivialTest without requiring Main.idr in temp tree"

[[spec]]
id = "REQ_ICWASM_TESTBUILD_003"
title = "setupTestBuild output compiles successfully"
invariant = "setupTestBuild が生成した temp ipkg SHALL compile successfully with the standard Tests.AllTests surface"

[[spec]]
id = "REQ_ICWASM_TESTBUILD_002"
title = "Test-build preserves package-local imports"
invariant = "All source imports needed by Tests.AllTests (including package-local modules under src/<PkgName>/...) are available in the temp tree via symlinks"

# =============================================================================
# Runtime Support Contract (lazy dfx coverage)
# =============================================================================

[[spec_area]]
name = "Runtime Support Contract"

[[spec]]
id = "REQ_ICWASM_RUNTIME_001"
title = "prepareRefCRuntime provides all headers required by RefC-generated C"
invariant = "RefC compatibility headers (including idris_memory.h equivalent) are present after runtime preparation"

[[spec]]
id = "REQ_ICWASM_RUNTIME_002"
title = "compileToWasmWithEntry fails with precise diagnostic on missing IC0 support"
invariant = "Missing ic0_stubs.c or wasi_stubs.c produces error naming each missing path"

[[spec]]
id = "REQ_ICWASM_RUNTIME_003"
title = "dfx coverage build requires ic0_stubs.c and wasi_stubs.c explicitly"
invariant = "Requirement is in SPEC, not implicit in Emscripten command"

[[spec]]
id = "REQ_ICWASM_RUNTIME_004"
title = "Default IC0 support bundle is sufficient for minimal coverage canister"
invariant = "No downstream package needs to reverse-engineer missing support files"

[[spec]]
id = "REQ_ICWASM_RUNTIME_005"
title = "RefC header compatibility aliases are created by the builder"
invariant = "If compileToWasmWithEntry depends on header aliases, builder creates them, not downstream"

[[spec]]
id = "REQ_ICWASM_RUNTIME_006"
title = "Generated test canister compiles with standard test surface"
invariant = "Tests.AllTests with runTests/runMinimalTests/runTrivialTest/allTests compiles to valid WASM"
